<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>英语学习工具</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <h1>英语学习工具</h1>
        
        <!-- 标签页切换 -->
        <div class="tabs">
            <button class="tab-btn active" data-tab="vocabulary">单词本</button>
            <button class="tab-btn" data-tab="listening">听力模块</button>
            <button class="tab-btn" data-tab="ai-assistant">AI 助手</button>
        </div>
        
        <!-- 单词本模块 -->
        <div id="vocabulary" class="tab-content active">
            <div class="section">
                <h2>单词添加</h2>
                <form id="add-word-form">
                    <div class="form-group">
                        <label for="word">英文单词：</label>
                        <input type="text" id="word" required>
                    </div>
                    <div class="form-group">
                        <label for="phonetic">音标：</label>
                        <input type="text" id="phonetic">
                    </div>
                    <div class="form-group">
                        <label for="meaning">中文释义：</label>
                        <input type="text" id="meaning" required>
                    </div>
                    <div class="form-group">
                        <label for="part-of-speech">词性：</label>
                        <input type="text" id="part-of-speech">
                    </div>
                    <div class="form-group">
                        <label for="tag">分类标签：</label>
                        <select id="tag">
                            <option value="未分类">未分类</option>
                            <option value="听力生词">听力生词</option>
                            <option value="阅读生词">阅读生词</option>
                        </select>
                    </div>
                    <button type="submit" class="btn">添加</button>
                </form>
            </div>
            
            <div class="section">
                <h2>单词列表</h2>
                <div class="filter-section">
                    <button class="filter-btn active" data-filter="all">全部</button>
                    <button class="filter-btn" data-filter="未分类">未分类</button>
                    <button class="filter-btn" data-filter="听力生词">听力生词</button>
                    <button class="filter-btn" data-filter="阅读生词">阅读生词</button>
                    <span id="filter-count">共 0 个单词</span>
                </div>
                <ul id="word-list"></ul>
            </div>
        </div>
        
        <!-- 听力模块 -->
        <div id="listening" class="tab-content">
            <div class="section">
                <h2>音频上传</h2>
                <input type="file" id="audio-upload" accept="audio/mp3,audio/wav">
                <div id="audio-info"></div>
            </div>
            
            <div class="section">
                <h2>听力原文</h2>
                <div class="text-upload-section">
                    <textarea id="transcript-input" placeholder="请输入听力原文"></textarea>
                    <button id="save-transcript-btn" class="btn">保存原文</button>
                </div>
                <div class="transcript-display">
                    <button id="show-transcript-btn" class="btn">查看原文</button>
                    <div id="transcript-content"></div>
                </div>
            </div>
            
            <div class="section">
                <h2>播放控制</h2>
                <div class="audio-player">
                    <audio id="audio-element"></audio>
                    <div class="controls">
                        <button id="play-btn">播放</button>
                        <button id="stop-btn">停止</button>
                        <div class="progress-container">
                            <div id="progress-bar"></div>
                            <div id="progress-markers"></div>
                        </div>
                        <div class="time-display">
                            <span id="current-time">00:00</span> / <span id="total-time">00:00</span>
                        </div>
                    </div>
                    <div class="advanced-controls">
                        <div class="speed-control">
                            <label for="playback-speed">倍速：</label>
                            <select id="playback-speed">
                                <option value="1.0" selected>1.0x</option>
                                <option value="1.25">1.25x</option>
                                <option value="1.5">1.5x</option>
                                <option value="2.0">2.0x</option>
                            </select>
                            <span id="current-speed">当前倍速：1.0x</span>
                        </div>
                        <button id="loop-btn">循环模式</button>
                    </div>
                </div>
            </div>
        </div>
        
        <!-- AI 助手模块 -->
        <div id="ai-assistant" class="tab-content">
            <div class="section">
                <h2>🤖 DeepSeek AI 助手</h2>
                <div class="ai-assistant">
                    <div class="ai-input-section">
                        <input type="text" id="ai-question" placeholder="输入你的英语学习问题，例如：explain the word serendipity">
                        <button id="ai-submit" class="btn">发送</button>
                    </div>
                    <div class="ai-response-section">
                        <h3>回答：</h3>
                        <div id="ai-answer"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    
    <div id="message"></div>
    
    <script src="script.js"></script>
    <script>
        // DeepSeek AI 助手功能
        document.addEventListener('DOMContentLoaded', function() {
            // API Key 定义（测试时替换为真实 Key，测试后恢复占位符）
            const DEEPSEEK_API_KEY = "YOUR_API_KEY_HERE";   // 使用这个占位符，不要填任何真实 Key
            // 测试时请把 YOUR_API_KEY_HERE 替换成你的真实 DeepSeek API Key，测试完成后必须立即删除或替换回占位符！
            
            // 初始化 AI 助手
            initAiAssistant();
            
            function initAiAssistant() {
                const aiQuestion = document.getElementById('ai-question');
                const aiSubmit = document.getElementById('ai-submit');
                const aiAnswer = document.getElementById('ai-answer');
                
                // 发送按钮点击事件
                aiSubmit.addEventListener('click', function() {
                    const question = aiQuestion.value.trim();
                    if (question) {
                        getAiResponse(question);
                    } else {
                        showMessage('请输入问题', 'error');
                    }
                });
                
                // 回车键发送
                aiQuestion.addEventListener('keypress', function(e) {
                    if (e.key === 'Enter') {
                        const question = aiQuestion.value.trim();
                        if (question) {
                            getAiResponse(question);
                        } else {
                            showMessage('请输入问题', 'error');
                        }
                    }
                });
            }
            
            // 获取 AI 回答
            function getAiResponse(question) {
                const aiAnswer = document.getElementById('ai-answer');
                
                // 显示加载状态
                aiAnswer.innerHTML = '<p>思考中...</p>';
                
                // 检查 API Key 是否填写
                if (DEEPSEEK_API_KEY === "YOUR_API_KEY_HERE") {
                    aiAnswer.innerHTML = '<p style="color: red;">错误：请替换 YOUR_API_KEY_HERE 为真实的 DeepSeek API Key</p>';
                    showMessage('请填写 API Key', 'error');
                    return;
                }
                
                // 构建请求数据
                const requestData = {
                    model: "deepseek-chat",
                    messages: [
                        {
                            role: "system",
                            content: "你是一个专业、友好、耐心且幽默的英语学习助手。请用简单易懂的中文回答用户的问题，并尽量提供例句和实用解释。"
                        },
                        {
                            role: "user",
                            content: question
                        }
                    ],
                    temperature: 0.7
                };
                
                // 发送请求
                fetch('https://api.deepseek.com/chat/completions', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${DEEPSEEK_API_KEY}`
                    },
                    body: JSON.stringify(requestData)
                })
                .then(response => {
                    if (!response.ok) {
                        throw new Error('API 请求失败');
                    }
                    return response.json();
                })
                .then(data => {
                    // 显示回答
                    const answer = data.choices[0].message.content;
                    aiAnswer.innerHTML = answer.replace(/\n/g, '<br>');
                    showMessage('回答已生成', 'success');
                })
                .catch(error => {
                    // 错误处理
                    aiAnswer.innerHTML = `<p style="color: red;">错误：${error.message}</p>`;
                    showMessage('请求失败，请检查网络或 API Key', 'error');
                });
            }
        });
    </script>
</body>
</html>
